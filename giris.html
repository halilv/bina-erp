<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bina ERP — Giriş</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="giris-page">
  <div class="giris-kart">
    <div class="giris-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="#534AB7"/>
        <rect x="8" y="18" width="24" height="16" rx="2" fill="white"/>
        <polygon points="4,20 20,8 36,20" fill="white"/>
        <rect x="16" y="24" width="8" height="10" rx="1" fill="#534AB7"/>
      </svg>
      <h1>Bina ERP</h1>
      <p>Yönetim Paneli</p>
    </div>
    <form id="girisForm">
      <div class="form-grup">
        <label>E-posta</label>
        <input type="email" id="email" placeholder="admin@binaerp.com" required autofocus>
      </div>
      <div class="form-grup">
        <label>Şifre</label>
        <input type="password" id="sifre" placeholder="••••••••" required>
      </div>
      <div id="hata-mesaji" class="hata-kutu" style="display:none"></div>
      <button type="submit" class="btn-tam" id="girisBtn">Giriş Yap</button>
    </form>
    <p class="giris-alt">Demo: admin@binaerp.com / admin123</p>
  </div>
  <script>
    if (localStorage.getItem('token')) window.location.href = '/';
    document.getElementById('girisForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('girisBtn');
      btn.disabled = true; btn.textContent = 'Giriş yapılıyor...';
      const hata = document.getElementById('hata-mesaji');
      hata.style.display = 'none';
      try {
        const res = await fetch('/api/auth/giris', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            sifre: document.getElementById('sifre').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.hata || 'Giriş başarısız');
        localStorage.setItem('token', data.token);
        localStorage.setItem('kullanici', JSON.stringify(data.kullanici));
        window.location.href = '/';
      } catch (err) {
        hata.textContent = err.message;
        hata.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Giriş Yap';
      }
    });
  </script>
</body>
</html>
